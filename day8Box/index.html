<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            background-color: aqua;
            width: 300px;
            height: 150px;

            border: 2px solid black;

            /* border: 2px dashed; */

            /* border: 2px dotted green; */

            /* border: 2px double orange; */

            border-radius: 10px;

            padding: 20px;

            margin: 20px;

            /* margin: auto; */

            /* box-sizing: content-box; it will include width + padding + margin + border */
            box-sizing: content-box;

            /* box-sizing: border-box;original width size */
            box-sizing: border-box;

        }

        p{
            border: 1px solid red;
            padding: 10px;
        }

    </style>
</head>
<body>
    <div class="box">
        <p>HELLO GUYZ</p>
    </div>
    <div class="box">
        <p>yoyo</p>
    </div>
    
</body>
</html>
