<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            height: 100vh;
            font-family: Arial, Helvetica, sans-serif;

            display: flex;
            justify-content: center;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
            
        }
        .product{
            border: 1px solid black;
            border-radius: 12px;
            width: 250px;
            padding: 12px;
            margin-bottom: 12px;

            text-align: center;
            /* box-shadow: xaxis Yaxis Spread-readius Color; */
            box-shadow:    4px 4px 8px black;
        }
        .product h2{
            border-bottom: 1px solid black;
        }

        .product img{
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 12px;
        }

        .product button{
            background-color: aqua;
            border: none;
            padding: 10px;
            border-radius: 12px;
            width: 90%;
        }
    </style>
</head>
<body>
    <div class="product">
        <img src="https://images.pexels.com/photos/12920900/pexels-photo-12920900.jpeg" >
        <h2>Headphones</h2>
        <p>Rs 2,999</p>
        <button>BUY NOW</button>
    </div>

    <div class="product">
        <img src="https://images.pexels.com/photos/20432893/pexels-photo-20432893.jpeg" >
        <h2>Laptop</h2>
        <p>Rs 79,999</p>
        <button>BUY NOW</button>
    </div>

    <div class="product">
        <img src="https://images.pexels.com/photos/20510002/pexels-photo-20510002.jpeg">
        <h2>Mouse</h2>
        <p>Rs 999</p>
        <button>BUY NOW</button>
    </div>

    <div class="product">
        <img src="https://images.pexels.com/photos/13989043/pexels-photo-13989043.jpeg" >
        <h2>TV</h2>
        <p>Rs 22,999</p>
        <button>BUY NOW</button>
    </div>
    
</body>
</html>
