<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display: grid;

            grid-template-columns: 250px 1fr;

            grid-template-rows: 80px auto 80px;
            gap: 20px;

            border: 1px solid black;
        }

        header{
            grid-column: 1/3;
            background: blue;
            padding: 20px;
            
        }

        aside{
            background: gray;
            padding: 20px;
        }

        main{
            background: aqua;
            padding: 20px;
        }

        footer{
            grid-column: 1/3;
            background: rgb(37, 36, 36);
        }

    </style>
</head>
<body>
    <div class="container">
        <header>Header</header>

        <aside>side bar</aside>

        <main>
            Main comtent
        </main>

        <footer>
            footer
        </footer>
    </div>
    
</body>
</html>
